name: Railway sleep schedule

on:
  schedule:
    - cron: '0 5 * * *'   # 08:00 Israel (IDT, UTC+3) — wake up
    - cron: '0 21 * * *'  # 00:00 Israel (IDT, UTC+3) — sleep
  workflow_dispatch:
    inputs:
      action:
        description: 'resume or suspend'
        required: true
        type: choice
        options: [resume, suspend]

jobs:
  toggle:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "05" ]; then
            echo "action=resume" >> $GITHUB_OUTPUT
          else
            echo "action=suspend" >> $GITHUB_OUTPUT
          fi

      - name: Toggle Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          SLEEP=$( [ "${{ steps.action.outputs.action }}" = "suspend" ] && echo "true" || echo "false" )
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\", input: { sleepApplication: $SLEEP }) }\"}")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"errors"' && exit 1 || echo "Service ${{ steps.action.outputs.action }}d."
